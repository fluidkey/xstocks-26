[profile.default]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
src = "src"
out = "out"
script = "script"
libs = ["lib"]
test = "test"
dotenv = ".env"

[fuzz]
runs = 256

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
